spring:
  application:
    name: crm

  # ===== DataSource =====
  datasource:
    # Значения берутся из ENV-переменных, дефолты для локального запуска.
    # В проде: DB_URL, DB_USERNAME, DB_PASSWORD задаются в окружении/secrets.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
    driver-class-name: org.postgresql.Driver
    # HikariCP (дефолтный пул в Spring Boot) — настройки пула соединений
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000   # 30 сек ожидания свободного соединения
      idle-timeout: 600000        # 10 мин — убрать простаивающее соединение
      max-lifetime: 1800000       # 30 мин — максимальное время жизни соединения

  # ===== JPA / Hibernate =====
  jpa:
    # none: DDL управляется Liquibase, Hibernate не трогает схему.
    # validate: проверяет соответствие сущностей и схемы БД (полезно в CI).
    # create-drop: пересоздаёт схему при старте/остановке (только для тестов).
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        # Форматировать SQL в логах (только если show-sql: true или DEBUG)
        format_sql: true
        # Dialect явно — без него Hibernate может угадать неверно при нестандартном JDBC URL
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Batch size для INSERT/UPDATE: накапливает N операций и отправляет одним пакетом.
        # Критично для bulk-операций — без батчинга N сущностей = N round-trips к БД.
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        # default_batch_fetch_size: решает часть N+1 через IN-запросы вместо отдельных SELECT
        default_batch_fetch_size: 25

  # ===== Liquibase =====
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:} — раскомментировать если Redis требует пароль

  # ===== Cache =====
  cache:
    # Тип кэша — Redis. Spring Boot автоматически создаст RedisCacheManager.
    # Наш RedisConfig переопределяет его с кастомными TTL и сериализатором.
    type: redis

crm:
  instance-name: crm-local
  security:
    jwt:
      secret: "change-me-please-change-me-please"
      expiration: 15m
      issuer: crm
  notification:
    enabled: true
    reminder-delay: 60s
  queue:
    capacity: 100

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.crm: DEBUG
    org.springframework: INFO
    # Логировать SQL — включать только при отладке, в проде оставлять INFO/OFF
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm_dev}

  jpa:
    show-sql: true

crm:
  instance-name: crm-dev

server:
  port: 8081

logging:
  level:
    com.crm: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

crm:
  instance-name: crm-prod

logging:
  level:
    com.crm: INFO
    org.hibernate.SQL: OFF
